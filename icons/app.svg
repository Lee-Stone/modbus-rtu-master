<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Background -->
  <rect width="64" height="64" rx="10" fill="#1a1f2e"/>

  <!-- Monitor body -->
  <rect x="6" y="7" width="52" height="34" rx="4" fill="#2b4580" stroke="#4299e1" stroke-width="1.5"/>
  <!-- Screen -->
  <rect x="10" y="11" width="44" height="26" rx="2" fill="#0d1b2e"/>

  <!-- Waveform on screen (serial data) -->
  <polyline
    points="12,30 16,30 18,20 21,38 25,26 28,30 32,30 34,22 38,36 41,30 44,30 46,24 49,34 52,30"
    stroke="#48bb78" stroke-width="1.8" fill="none"
    stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Status dot top-right -->
  <circle cx="49" cy="16" r="3" fill="#48bb78"/>

  <!-- Monitor stand neck -->
  <rect x="28" y="41" width="8" height="5" rx="1" fill="#4299e1"/>
  <!-- Stand base -->
  <rect x="20" y="46" width="24" height="3.5" rx="1.8" fill="#4299e1"/>

  <!-- Serial port connector body -->
  <rect x="10" y="53" width="44" height="7" rx="3" fill="#2d3748"/>
  <!-- Connector pins -->
  <circle cx="19" cy="56.5" r="1.8" fill="#a0aec0"/>
  <circle cx="27" cy="56.5" r="1.8" fill="#a0aec0"/>
  <circle cx="35" cy="56.5" r="1.8" fill="#a0aec0"/>
  <circle cx="43" cy="56.5" r="1.8" fill="#a0aec0"/>
</svg>
