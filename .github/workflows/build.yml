name: Build

on:
  workflow_dispatch:
    inputs:
      version:
        required: true
        default: '1.0.0'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.3'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_mingw'
          modules: 'qtserialbus qtserialport'
          tools: 'tools_mingw1310'
          cache: true

      - name: Add Qt MinGW to PATH
        shell: pwsh
        run: |
          Add-Content $env:GITHUB_PATH "${{ env.IQTA_TOOLS }}\mingw1310_64\bin"

      - name: Build
        shell: cmd
        run: |
          mkdir build
          cd build
          qmake ..\modbus-rtu-master.pro -spec win32-g++ "CONFIG+=release"
          mingw32-make -j4

      - name: Deploy
        shell: cmd
        run: |
          mkdir deploy
          copy build\release\modbus-rtu-master.exe deploy\
          windeployqt --release --no-translations deploy\modbus-rtu-master.exe

      - name: Package
        shell: pwsh
        run: |
          Compress-Archive -Path deploy\* -DestinationPath modbus-rtu-master.zip

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.event.inputs.version }}
          name: v${{ github.event.inputs.version }}
          files: modbus-rtu-master.zip
